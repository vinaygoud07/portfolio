<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        nav {
    background: #111;
    padding: 15px 0;
    position: fixed;
    width: 100%;
    top: 0;
}

.nav-links {
    list-style: none;
    display: flex;
    justify-content: center;  
    gap:40px;
}

.nav-links li a {
    text-decoration: none;
    color: white;
    font-size: 18px;
    transition: 0.3s;
}

.nav-links li a:hover {
    color: #00bcd4;
}
          /* Contact Section */
#contact {
    padding: 100px 20px;
    background: #ffffff;
    text-align: center;
}

#contact h1 {
    margin-bottom: 40px;
    font-size: 36px;
}

.contact-container {
    display: flex;
    justify-content: center;
}

form {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

form input,
form textarea {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

form input:focus,
form textarea:focus {
    outline: none;
    border: 1px solid #00bcd4;
}

form button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

form button:hover {
    background: #00bcd4;
}

/* Responsive */
@media (max-width: 768px) {
    form {
        width: 90%;
    }
}
        

    </style>
</head>
<body>
    <nav>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="Education.html">Education</a></li>
            <li><a href="project1.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    
<section id="contact">
    <h1>Contact Me</h1>

    <div class="contact-container">
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
</section>

    
</body>
</html>
